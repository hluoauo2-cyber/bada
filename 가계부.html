<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="가계부"/>
<title>가계부</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans KR',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;}
  .container{max-width:480px;margin:0 auto;padding:0 0 80px;}
  .header{background:#fff;padding:20px 20px 16px;border-bottom:1px solid #ebebeb;position:sticky;top:0;z-index:100;}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .month-nav{display:flex;align-items:center;gap:12px;}
  .month-nav button{background:none;border:1px solid #e0e0e0;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;color:#555;display:flex;align-items:center;justify-content:center;}
  .month-title{font-size:17px;font-weight:700;color:#1a1a1a;}
  .save-badge{font-size:11px;color:#888;display:flex;align-items:center;gap:4px;}
  .save-dot{width:6px;height:6px;border-radius:50%;background:#4caf7d;}
  .save-dot.saving{background:#f0a500;}
  .save-dot.error{background:#e84545;}
  .budget-section{padding:14px 0 0;}
  .budget-row{margin-bottom:10px;}
  .budget-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
  .budget-label{font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;}
  .budget-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .budget-amounts{font-size:11px;color:#888;}
  .budget-amounts span{font-weight:500;}
  .bar-track{height:6px;background:#ebebeb;border-radius:99px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:99px;transition:width 0.4s;}
  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 20px 14px;}
  .summary-card{background:#fff;border-radius:12px;padding:10px 10px 8px;border:1px solid #ebebeb;}
  .summary-card .lbl{font-size:10px;color:#999;margin-bottom:3px;line-height:1.3;}
  .summary-card .val{font-size:14px;font-weight:700;}
  .val.ok{color:#4caf7d;}
  .val.danger{color:#e84545;}
  .val.neutral{color:#555;}
  .week-tabs{display:flex;gap:6px;padding:0 20px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .week-tabs::-webkit-scrollbar{display:none;}
  .week-tab{padding:6px 16px;border-radius:99px;border:1px solid #e0e0e0;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#888;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
  .week-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
  .day-list{padding:0 16px;display:flex;flex-direction:column;gap:8px;}
  .day-card{background:#fff;border-radius:14px;border:1px solid #ebebeb;overflow:hidden;}
  .day-header{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;}
  .day-name{font-size:14px;font-weight:500;color:#1a1a1a;}
  .day-date{font-size:12px;color:#aaa;margin-left:5px;}
  .day-right{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
  .chip{font-size:11px;padding:3px 8px;border-radius:99px;font-weight:500;}
  .chip-life{background:#e8f7ef;color:#2a8a57;}
  .chip-date{background:#e8f0fb;color:#2a5fc4;}
  .chip-none{background:#f5f5f5;color:#bbb;}
  .arrow{font-size:10px;color:#bbb;margin-left:3px;transition:transform 0.2s;display:inline-block;}
  .arrow.open{transform:rotate(180deg);}
  .day-body{border-top:1px solid #f0f0f0;padding:10px 14px;}
  .expense-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
  .cat-select{font-size:12px;padding:6px 6px;border-radius:8px;border:1px solid #e0e0e0;background:#f8f8f8;color:#333;cursor:pointer;font-family:'Noto Sans KR',sans-serif;flex-shrink:0;}
  .desc-input{flex:1;font-size:13px;padding:6px 8px;border:1px solid #e0e0e0;border-radius:8px;background:#f8f8f8;color:#1a1a1a;font-family:'Noto Sans KR',sans-serif;min-width:0;}
  .amt-input{width:88px;font-size:13px;padding:6px 8px;border:1px solid #e0e0e0;border-radius:8px;background:#f8f8f8;color:#1a1a1a;font-family:'Noto Sans KR',sans-serif;flex-shrink:0;}
  .del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;padding:2px 4px;flex-shrink:0;}
  .del-btn:active{color:#e84545;}
  .add-expense-btn{font-size:12px;color:#4a90e2;background:none;border:none;cursor:pointer;padding:2px 0;font-family:'Noto Sans KR',sans-serif;font-weight:500;}
  .fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:#1a1a1a;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.18);display:flex;align-items:center;justify-content:center;z-index:200;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;display:flex;align-items:flex-end;}
  .modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:18px;}
  .modal-row{margin-bottom:14px;}
  .modal-label{font-size:12px;color:#888;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
  .modal-input{width:100%;font-size:15px;padding:10px 12px;border:1px solid #e0e0e0;border-radius:10px;font-family:'Noto Sans KR',sans-serif;color:#1a1a1a;}
  .modal-btn{width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:6px;}
  .hidden{display:none;}
  .loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.9);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-size:14px;color:#888;font-family:'Noto Sans KR',sans-serif;}
  .spinner{width:24px;height:24px;border:2px solid #ebebeb;border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-top">
      <div class="month-nav">
        <button id="prevBtn">&#8592;</button>
        <div class="month-title" id="monthTitle"></div>
        <button id="nextBtn">&#8594;</button>
      </div>
      <div class="save-badge">
        <div class="save-dot" id="saveDot"></div>
        <span id="saveLabel">불러오는 중...</span>
      </div>
    </div>
    <div class="budget-section">
      <div class="budget-row" id="lifeBudgetBar"></div>
      <div class="budget-row" id="dateBudgetBar"></div>
    </div>
  </div>
  <div class="summary-grid" id="summaryGrid"></div>
  <div class="week-tabs" id="weekTabs"></div>
  <div class="day-list" id="dayList"></div>
</div>

<button class="fab" id="fabBtn">⚙</button>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">예산 설정</div>
    <div class="modal-row">
      <div class="modal-label"><span style="width:7px;height:7px;border-radius:50%;background:#4caf7d;display:inline-block;"></span>생활비 예산</div>
      <input type="number" class="modal-input" id="lifeInput" placeholder="예: 185000"/>
    </div>
    <div class="modal-row">
      <div class="modal-label"><span style="width:7px;height:7px;border-radius:50%;background:#4a90e2;display:inline-block;"></span>데이트 예산</div>
      <input type="number" class="modal-input" id="dateInput" placeholder="예: 250000"/>
    </div>
    <button class="modal-btn" id="saveBudgetBtn">저장</button>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div>데이터 불러오는 중...</div>
</div>

<script>
const DAYS = ['월요일','화요일','수요일','목요일','금요일','토요일','일요일'];
const API_KEY = '$2a$10$6iDYgar8yYgaVrG.zlifU.fU0WH.oWAJ8H/z.Qc/CBJkL0yFbhv4S';
const BIN_ID = '69cf2a4236566621a874e1c8'; // 고정 Bin ID
const LOCAL_CACHE = 'gaegyebu-cache-v2';

let state = {
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  activeWeek: 0,
  budget: {},
  expenses: {},
  openDays: {}
};

async function readBin() {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: { 'X-Master-Key': API_KEY }
  });
  if (!res.ok) throw new Error('read failed');
  const json = await res.json();
  return json.record;
}

async function writeBin(data) {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': API_KEY
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error('write failed');
}

async function loadData() {
  try {
    const data = await readBin();
    if (data && (data.budget || data.expenses)) {
      state.budget = data.budget || {};
      state.expenses = data.expenses || {};
      localStorage.setItem(LOCAL_CACHE, JSON.stringify(data));
    } else {
      // bin이 비어있으면 기본 예산 설정
      state.budget['2026-04'] = { life: 185000, date: 250000 };
    }
  } catch(e) {
    // 오프라인이면 로컬 캐시
    try {
      const local = localStorage.getItem(LOCAL_CACHE);
      if (local) {
        const p = JSON.parse(local);
        state.budget = p.budget || {};
        state.expenses = p.expenses || {};
      } else {
        state.budget['2026-04'] = { life: 185000, date: 250000 };
      }
    } catch(e2) {}
    setStatus('오프라인', false, true);
  }
  document.getElementById('loadingOverlay').classList.add('hidden');
  setStatus('저장됨', false);
  render();
}

let saveTimer = null;
function save() {
  setStatus('저장 중...', true);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const data = { budget: state.budget, expenses: state.expenses };
    localStorage.setItem(LOCAL_CACHE, JSON.stringify(data));
    try {
      await writeBin(data);
      setStatus('저장됨', false);
    } catch(e) {
      setStatus('오프라인 저장', false, true);
    }
  }, 800);
}

function setStatus(text, saving, error) {
  document.getElementById('saveLabel').textContent = text;
  const dot = document.getElementById('saveDot');
  dot.className = 'save-dot' + (saving ? ' saving' : error ? ' error' : '');
}

function mk() { return `${state.year}-${String(state.month+1).padStart(2,'0')}`; }
function ek(w,d) { return `${mk()}-w${w}-d${d}`; }
function fmt(n) { return Math.round(n).toLocaleString('ko-KR')+'원'; }
function pct(used,total) { return total>0?Math.min(100,Math.round(used/total*100)):0; }
function barColor(p,base) { return p>=100?'#e84545':p>=80?'#f0a500':base; }

function getWeeks() {
  const y=state.year,m=state.month;
  const last=new Date(y,m+1,0).getDate();
  const firstDow=new Date(y,m,1).getDay();
  const offset=firstDow===0?6:firstDow-1;
  let weeks=[];
  for(let ww=0;ww<6;ww++){
    let days=[];
    for(let dd=0;dd<7;dd++){
      const date=1-offset+ww*7+dd;
      if(date>=1&&date<=last) days.push({date,dayIdx:dd});
    }
    if(days.length) weeks.push({weekNum:ww,days});
  }
  return weeks;
}

function usedByCat() {
  const m=mk(); let life=0,date=0;
  Object.keys(state.expenses).forEach(k=>{
    if(!k.startsWith(m)) return;
    (state.expenses[k]||[]).forEach(e=>{
      const a=parseFloat(e.amount)||0;
      if(e.cat==='date') date+=a; else life+=a;
    });
  });
  return {life,date};
}

function renderBudgetBars() {
  const b=state.budget[mk()]||{life:0,date:0};
  const used=usedByCat();
  ['life','date'].forEach(cat=>{
    const total=b[cat]||0, u=used[cat], p2=pct(u,total);
    const color=cat==='life'?'#4caf7d':'#4a90e2';
    const label=cat==='life'?'생활비':'데이트';
    document.getElementById(cat+'BudgetBar').innerHTML=`
      <div class="budget-row-top">
        <div class="budget-label"><span class="budget-dot" style="background:${color}"></span>${label}</div>
        <div class="budget-amounts">${total>0?`${fmt(u)} / <span>${fmt(total)}</span> (${p2}%)`:'예산 미설정'}</div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${p2}%;background:${barColor(p2,color)};"></div></div>
    `;
  });
}

function renderSummary() {
  const b=state.budget[mk()]||{life:0,date:0};
  const used=usedByCat();
  const lr=b.life-used.life, dr=b.date-used.date, tr=lr+dr;
  const has=b.life>0||b.date>0;
  document.getElementById('summaryGrid').innerHTML=`
    <div class="summary-card"><div class="lbl">생활비 남은</div><div class="val ${b.life>0?(lr<0?'danger':'ok'):'neutral'}">${b.life>0?fmt(lr):'미설정'}</div></div>
    <div class="summary-card"><div class="lbl">데이트 남은</div><div class="val ${b.date>0?(dr<0?'danger':'ok'):'neutral'}">${b.date>0?fmt(dr):'미설정'}</div></div>
    <div class="summary-card"><div class="lbl">총 남은</div><div class="val ${has?(tr<0?'danger':'ok'):'neutral'}">${has?fmt(tr):'-'}</div></div>
  `;
}

function renderWeekTabs() {
  const weeks=getWeeks();
  if(state.activeWeek>=weeks.length) state.activeWeek=0;
  document.getElementById('weekTabs').innerHTML=weeks.map((w,i)=>
    `<button class="week-tab ${state.activeWeek===i?'active':''}" onclick="setWeek(${i})">${i+1}주차</button>`
  ).join('');
}

function setWeek(i){state.activeWeek=i;renderWeekTabs();renderDays();}

function renderDays() {
  const weeks=getWeeks();
  const week=weeks[state.activeWeek]||weeks[0];
  if(!week) return;
  const list=document.getElementById('dayList');
  list.innerHTML='';
  week.days.forEach(({date,dayIdx})=>{
    const k=ek(state.activeWeek,dayIdx);
    const items=state.expenses[k]||[];
    const lifeTotal=items.filter(e=>e.cat!=='date').reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const dateTotal=items.filter(e=>e.cat==='date').reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const isOpen=!!state.openDays[k];
    const card=document.createElement('div');
    card.className='day-card';
    let chips='';
    if(lifeTotal>0) chips+=`<span class="chip chip-life">생활비 ${fmt(lifeTotal)}</span>`;
    if(dateTotal>0) chips+=`<span class="chip chip-date">데이트 ${fmt(dateTotal)}</span>`;
    if(!lifeTotal&&!dateTotal) chips=`<span class="chip chip-none">지출 없음</span>`;
    card.innerHTML=`
      <div class="day-header" onclick="toggleDay('${k}')">
        <div><span class="day-name">${DAYS[dayIdx]}</span><span class="day-date">${state.month+1}월 ${date}일</span></div>
        <div class="day-right">${chips}<span class="arrow ${isOpen?'open':''}">▼</span></div>
      </div>
      ${isOpen?renderBody(k,items):''}
    `;
    list.appendChild(card);
  });
}

function renderBody(k,items) {
  let rows=items.map((item,idx)=>`
    <div class="expense-row">
      <select class="cat-select" onchange="updateExp('${k}',${idx},'cat',this.value)">
        <option value="life" ${item.cat!=='date'?'selected':''}>생활비</option>
        <option value="date" ${item.cat==='date'?'selected':''}>데이트</option>
      </select>
      <input type="text" class="desc-input" placeholder="내용" value="${(item.desc||'').replace(/"/g,'&quot;')}" oninput="updateExp('${k}',${idx},'desc',this.value)"/>
      <input type="number" class="amt-input" placeholder="금액" value="${item.amount||''}" oninput="updateExp('${k}',${idx},'amount',this.value)"/>
      <button class="del-btn" onclick="delExp('${k}',${idx})">✕</button>
    </div>
  `).join('');
  return `<div class="day-body">${rows}<button class="add-expense-btn" onclick="addExp('${k}')">+ 내역 추가</button></div>`;
}

function toggleDay(k){state.openDays[k]=!state.openDays[k];renderDays();}

function addExp(k){
  if(!state.expenses[k]) state.expenses[k]=[];
  state.expenses[k].push({cat:'life',desc:'',amount:''});
  state.openDays[k]=true;
  save();renderDays();renderSummary();renderBudgetBars();
}

function updateExp(k,idx,field,val){
  if(!state.expenses[k]) state.expenses[k]=[];
  state.expenses[k][idx][field]=val;
  save();renderSummary();renderBudgetBars();
  if(field==='cat') renderDays();
}

function delExp(k,idx){
  state.expenses[k].splice(idx,1);
  save();renderDays();renderSummary();renderBudgetBars();
}

function render(){
  document.getElementById('monthTitle').textContent=`${state.year}년 ${state.month+1}월`;
  renderBudgetBars();renderSummary();renderWeekTabs();renderDays();
}

document.getElementById('prevBtn').onclick=()=>{
  if(state.month===0){state.month=11;state.year--;}else state.month--;
  state.activeWeek=0;render();
};
document.getElementById('nextBtn').onclick=()=>{
  if(state.month===11){state.month=0;state.year++;}else state.month++;
  state.activeWeek=0;render();
};

document.getElementById('fabBtn').onclick=()=>{
  const b=state.budget[mk()]||{life:0,date:0};
  if(b.life>0) document.getElementById('lifeInput').value=b.life;
  if(b.date>0) document.getElementById('dateInput').value=b.date;
  document.getElementById('modalOverlay').classList.remove('hidden');
};
document.getElementById('modalOverlay').onclick=e=>{
  if(e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.add('hidden');
};
document.getElementById('saveBudgetBtn').onclick=()=>{
  const life=parseFloat(document.getElementById('lifeInput').value)||0;
  const date=parseFloat(document.getElementById('dateInput').value)||0;
  if(!state.budget[mk()]) state.budget[mk()]={life:0,date:0};
  if(life>0) state.budget[mk()].life=life;
  if(date>0) state.budget[mk()].date=date;
  save();render();
  document.getElementById('modalOverlay').classList.add('hidden');
};

loadData();
</script>
</body>
</html>
